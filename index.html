<head>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="data:application/json,{

    &quot;start_url&quot;:&quot;.&quot;,
    &quot;display&quot;:&quot;standalone&quot;,
    &quot;orientation&quot;:&quot;portrait&quot;,

  }">
  
  <title>Basal Group</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Mesmo estilo do anterior - mantido */
    :root{
      --bg:#f0f2f6;--surface:#fff;--s2:#f0f2f7;--border:#dce0e8;--bd2:#c5ccd8;
      --text:#1a1d24;--t2:#4a5568;--t3:#7a8699;
      --ac:#1a56db;--acbg:#e8f0fe;
      --gn:#0d7a4e;--gnbg:#e6f5ee;
      --am:#92400e;--ambg:#fef3c7;
      --rd:#991b1b;--rdbg:#fee2e2;
      --pu:#5b21b6;--pubg:#ede9fe;
      --r:12px;--rsm:8px;
      --f-size:14px;
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:var(--f-size);line-height:1.5;touch-action:manipulation;}
    button{cursor:pointer;font-family:inherit;font-size:13px;border:none;transition:all .12s;}
    input,select,textarea{font-family:inherit;font-size:13px;color:var(--text);outline:none;}

    .app{display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:100;transition:transform .25s;}
    .logo{padding:14px 16px;border-bottom:1px solid var(--border);}
    .logo .br{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px;}
    .logo .br span{background:var(--ac);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;}
    .logo .sub{font-size:11px;color:var(--t3);margin-top:2px;}
    nav{flex:1;padding:8px 0;overflow-y:auto;}
    .ni{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;border-left:3px solid transparent;}
    .ni:active{background:var(--acbg);}
    .ni.active{background:var(--acbg);color:var(--ac);border-left-color:var(--ac);}
    .ni svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;}
    .sfooter{padding:10px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--t3);}
    .sfooter button{background:none;border:1px solid var(--bd2);border-radius:4px;padding:4px 10px;font-size:10px;color:var(--t2);cursor:pointer;width:100%;margin-top:4px;}
    .sfooter label span{display:block;border:1px solid var(--bd2);border-radius:4px;padding:4px 10px;font-size:10px;color:var(--t2);text-align:center;margin-top:4px;cursor:pointer;}

    .main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:52px;}
    .topbar .left{display:flex;align-items:center;gap:6px;}
    .topbar h1{font-size:16px;font-weight:700;}
    .hbg{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px;}
    .content-wrap{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(16px + var(--safe-bottom));}
    .ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;}

    .btn{padding:7px 14px;border-radius:var(--rsm);font-weight:500;display:inline-flex;align-items:center;gap:5px;font-size:13px;}
    .bp{background:var(--ac);color:#fff;}.bp:active{background:#1648c0;transform:scale(.96);}
    .bs{background:var(--surface);border:1px solid var(--bd2);color:var(--text);}.bs:active{background:var(--bg);}
    .bd{background:var(--rdbg);color:var(--rd);border:1px solid #fca5a5;}
    .bg_{background:var(--gnbg);color:var(--gn);border:1px solid #6ee7b7;}
    .bsm{padding:4px 10px;font-size:12px;}.bxs{padding:3px 8px;font-size:11px;}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
    .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .ct{font-size:15px;font-weight:700;}

    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;}
    .sl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
    .sv{font-size:20px;font-weight:800;line-height:1.2;}
    .ss{font-size:10px;color:var(--t3);margin-top:2px;}
    .sbl{border-left:3px solid var(--ac);}.sgn{border-left:3px solid var(--gn);}
    .sam{border-left:3px solid #d97706;}.spu{border-left:3px solid var(--pu);}

    .tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th{text-align:left;font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;padding:7px 8px;border-bottom:1px solid var(--border);background:var(--s2);white-space:nowrap;}
    td{padding:7px 8px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:active td{background:var(--bg);}

    .badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
    .bbl{background:var(--acbg);color:var(--ac);}
    .bgn{background:var(--gnbg);color:var(--gn);}
    .bam{background:var(--ambg);color:var(--am);}
    .brd{background:var(--rdbg);color:var(--rd);}
    .bgr{background:var(--s2);color:var(--t2);}
    .bpu{background:var(--pubg);color:var(--pu);}
    .btl{background:#e0f5f0;color:#0d6e56;}

    .fg{margin-bottom:10px;}
    .fl{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:3px;}
    .fi{width:100%;border:1.5px solid var(--border);border-radius:var(--rsm);padding:8px 10px;background:var(--surface);font-size:13px;}
    .fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(26,86,219,.12);}
    .r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .mbg{position:fixed;inset:0;background:rgba(10,14,30,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
    .modal{background:var(--surface);border-radius:14px;width:100%;max-width:580px;margin:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);}
    .mh{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .mh h2{font-size:15px;font-weight:700;}
    .mb_{padding:14px 18px;}
    .mf{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
    .mx{background:none;font-size:22px;color:var(--t3);padding:0 4px;line-height:1;}.mx:active{color:var(--text);}

    .sr{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
    .si{flex:1;min-width:140px;border:1.5px solid var(--border);border-radius:var(--rsm);padding:7px 10px;background:var(--surface);font-size:13px;}
    .si:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(26,86,219,.1);}

    .og{display:grid;grid-template-columns:24px 1fr 50px 44px 58px 64px 60px 50px 24px;gap:3px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);}
    .og:last-child{border-bottom:none;}
    .oh{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;}
    .og input{padding:4px 5px;border:1.5px solid var(--border);border-radius:var(--rsm);width:100%;text-align:right;font-size:11px;background:var(--surface);}
    .og input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(26,86,219,.1);}
    .og input[readonly]{background:var(--s2);color:var(--t2);}
    .og input.editable{background:#e8f0fe;border-color:#1a56db;}
    .og select{font-size:11px;padding:4px 5px;border:1.5px solid var(--border);border-radius:var(--rsm);width:100%;background:var(--surface);}
    .totbox{background:var(--acbg);border-radius:var(--rsm);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:6px;}
    .totbox .valor{font-size:20px;font-weight:800;color:var(--ac);}

    .toast{position:fixed;bottom:calc(16px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:var(--r);font-size:12px;font-weight:500;z-index:500;opacity:0;transition:all .3s;pointer-events:none;max-width:90%;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.15);}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .tok{background:var(--gn);color:#fff;}.terr{background:var(--rd);color:#fff;}.tinfo{background:var(--text);color:#fff;}

    .empty{text-align:center;padding:30px 16px;color:var(--t3);}
    .empty p{font-size:13px;color:var(--t2);margin-bottom:2px;}

    .barr{margin-bottom:6px;}
    .brl{font-size:11px;color:var(--t2);display:flex;justify-content:space-between;margin-bottom:1px;}
    .brbg{background:var(--s2);border-radius:20px;height:5px;overflow:hidden;}
    .brfill{height:100%;border-radius:20px;background:var(--ac);transition:width .4s;}

    .backup-indicator{position:fixed;bottom:calc(70px + var(--safe-bottom));right:16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:9px;color:var(--t3);box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:6px;z-index:50;opacity:0;transition:opacity .5s;}
    .backup-indicator.show{opacity:1;}
    .backup-indicator .dot{width:5px;height:5px;border-radius:50%;background:var(--gn);}
    .backup-indicator .dot.saving{background:#d97706;animation:pulse .5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

    @media print{
      .sidebar,.topbar,#actions,.hbg,.ovl,.toast,.backup-indicator{display:none!important;}
      .main{margin:0!important;padding:0!important;}
      .content-wrap{overflow:visible!important;padding:10px!important;}
      .card{border:1px solid #ddd!important;box-shadow:none!important;page-break-inside:avoid;}
      .no-print{display:none!important;}
    }

    @media(max-width:768px){
      .sidebar{position:fixed;top:0;left:0;bottom:0;width:85%;max-width:280px;transform:translateX(-100%);box-shadow:2px 0 20px rgba(0,0,0,.1);}
      .sidebar.open{transform:translateX(0);}
      .ovl.open{display:block;}
      .hbg{display:block;}
      .content-wrap{padding:12px;}
      .stats{grid-template-columns:1fr 1fr;}
      .r2{grid-template-columns:1fr;}
      .og{grid-template-columns:18px 1fr 40px 36px 46px 52px 48px 40px 18px;gap:2px;}
      .og input,.og select{font-size:10px;padding:3px 4px;}
      .totbox .valor{font-size:18px;}
    }

    @media(max-width:480px){
      :root{--f-size:13px;}
      .sv{font-size:17px;}
      .stats{grid-template-columns:1fr 1fr;gap:6px;}
      .stat{padding:9px 10px;}
      .content-wrap{padding:10px;}
      td,th{padding:5px 6px;font-size:11px;}
      .btn{font-size:12px;padding:5px 10px;}
      .bsm{padding:3px 8px;font-size:11px;}
      .bxs{padding:2px 6px;font-size:10px;}
      .modal{max-width:100%;border-radius:10px;margin:8px;}
      .topbar h1{font-size:14px;}
      .topbar{padding:8px 12px;min-height:44px;}
      .ni{padding:8px 12px;font-size:12px;}
      .og{grid-template-columns:14px 1fr 34px 30px 38px 44px 40px 34px 14px;gap:2px;}
      .og input,.og select{font-size:9px;padding:2px 3px;}
      .totbox .valor{font-size:16px;}
      .totbox{padding:8px 10px;}
      .card{padding:10px;}
      .mh,.mb_,.mf{padding:10px 12px;}
    }

    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:10px;}
  </style>
</head>

    </div>
  </aside>

  <div class="main">

        <h1 id="pageTitle">Painel</h1>

    </div>
    <div class="content-wrap" id="content"></div>
  </div>
</div>

// Cache local em memória (sincronizado com Supabase) — permite as funções

let _cache = { clientes: [], pedidos: [], itens: [], parcelas: [] };

const TABLE_MAP = { clientes:'clientes', pedidos:'pedidos', itens:'pedido_itens', parcelas:'comissao_parcelas' };

async function loadAllFromCloud(){
  const [c,p,it,pa] = await Promise.all([
    sb.from('clientes').select('*').order('nome'),
    sb.from('pedidos').select('*').order('created_at',{ascending:false}),
    sb.from('pedido_itens').select('*'),
    sb.from('comissao_parcelas').select('*'),
  ]);
  if(c.error) console.error('Erro clientes:', c.error);
  if(p.error) console.error('Erro pedidos:', p.error);
  if(it.error) console.error('Erro itens:', it.error);
  if(pa.error) console.error('Erro parcelas:', pa.error);
  _cache.clientes = (c.data||[]).map(normalizeCliente);
  _cache.pedidos  = (p.data||[]).map(normalizePedido);
  _cache.itens    = (it.data||[]).map(normalizeItem);
  _cache.parcelas = (pa.data||[]).map(normalizeParcela);
}

// Normaliza nomes de coluna do Postgres (minúsculas) para o formato camelCase usado no app
function normalizeCliente(c){
  return {...c, proxAcao:c.proxacao??c.proxAcao, dataAcao:c.dataacao??c.dataAcao, valPot:c.valpot??c.valPot};
}
function normalizePedido(p){
  return {...p, clienteId:p.clienteid??p.clienteId, clienteNome:p.clientenome??p.clienteNome, clienteCNPJ:p.clientecnpj??p.clienteCNPJ, clienteCidade:p.clientecidade??p.clienteCidade};
}
function normalizeItem(i){
  return {...i, pedId:i.pedid??i.pedId, qtdCx:i.qtdcx??i.qtdCx, totUn:i.totun??i.totUn, totIt:i.totit??i.totIt, comIt:i.comit??i.comIt};
}
function normalizeParcela(p){
  return {...p, pedId:p.pedid??p.pedId, pedNum:p.pednum??p.pedNum, clienteNome:p.clientenome??p.clienteNome, venc:p.vencimento??p.venc};
}

// Converte de volta para o formato de colunas do banco antes de enviar
function denormalizeCliente(c){
  const {proxAcao,dataAcao,valPot,...rest} = c;
  return {...rest, proxacao:proxAcao, dataacao:dataAcao||null, valpot:valPot};
}
function denormalizePedido(p){
  const {clienteId,clienteNome,clienteCNPJ,clienteCidade,...rest} = p;
  return {...rest, clienteid:clienteId, clientenome:clienteNome, clientecnpj:clienteCNPJ, clientecidade:clienteCidade};
}
function denormalizeItem(i){
  const {pedId,qtdCx,totUn,totIt,comIt,...rest} = i;
  return {...rest, pedid:pedId, qtdcx:qtdCx, totun:totUn, totit:totIt, comit:comIt};
}
function denormalizeParcela(p){
  const {pedId,pedNum,clienteNome,venc,...rest} = p;
  return {...rest, pedid:pedId, pednum:pedNum, clientenome:clienteNome, vencimento:venc||rest.vencimento};
}

function getData(store) {
  return _cache[store] || [];
}

// setData agora dispara gravação no Supabase em background, mas atualiza
// o cache local IMEDIATAMENTE para a UI responder na hora.
function setData(store, data) {
  _cache[store] = data;
  showBackupIndicator(true);
  syncStoreToCloud(store, data).catch(e=>{
    console.error('Erro ao sincronizar', store, e);
    toast('⚠️ Erro ao salvar na nuvem: '+e.message,'terr');
  });
  return true;
}

// Sincroniza um array inteiro com a tabela do Supabase (upsert + delete dos removidos)
async function syncStoreToCloud(store, data){
  const table = TABLE_MAP[store];
  if(!table || !sb) return;
  const denorm = store==='clientes'?denormalizeCliente:store==='pedidos'?denormalizePedido:store==='itens'?denormalizeItem:denormalizeParcela;
  if(data.length===0){
    // Apaga tudo da tabela (raro, mas possível em reset)
    await sb.from(table).delete().neq('id','___none___');
    return;
  }
  const rows = data.map(denorm);
  const {error} = await sb.from(table).upsert(rows, {onConflict:'id'});
  if(error) throw error;
}

function addData(store, item) {
  const data = getData(store);
  data.push(item);
  setData(store, data);
}

async function updateData(store, id, newData) {
  const data = getData(store);
  const idx = data.findIndex(item => item.id === id);
  if (idx >= 0) {
    data[idx] = { ...data[idx], ...newData };
    _cache[store] = data;
    showBackupIndicator(true);
    const table = TABLE_MAP[store];
    const denorm = store==='clientes'?denormalizeCliente:store==='pedidos'?denormalizePedido:store==='itens'?denormalizeItem:denormalizeParcela;
    try{
      const {error} = await sb.from(table).update(denorm(data[idx])).eq('id', id);
      if(error) throw error;
    }catch(e){
      console.error('Erro ao atualizar', store, e);
      toast('⚠️ Erro ao salvar: '+e.message,'terr');
    }
    return true;
  }
  return false;
}

async function deleteData(store, id) {
  _cache[store] = getData(store).filter(item => item.id !== id);
  showBackupIndicator(true);
  const table = TABLE_MAP[store];
  try{
    const {error} = await sb.from(table).delete().eq('id', id);
    if(error) throw error;
  }catch(e){
    console.error('Erro ao excluir', store, e);
    toast('⚠️ Erro ao excluir: '+e.message,'terr');
  }
}

function showBackupIndicator(ativo){
  const el = document.getElementById('backupIndicator');
  const dot = document.getElementById('backupDot');
  const text = document.getElementById('backupText');
  if(!el) return;
  el.classList.add('show');
  if(ativo){
    dot.className = 'dot saving';
    text.textContent = 'Salvando...';
    clearTimeout(window._backupHide);
    window._backupHide = setTimeout(() => {
      dot.className = 'dot';
      text.textContent = '✅ Dados salvos';
      setTimeout(() => el.classList.remove('show'), 1500);
    }, 600);
  }
}

function saveCliente(){
  const nome=v('cn').trim();
  if(!nome){toast('Nome obrigatório','terr');return;}
  const data={nome,cnpj:v('ccnpj'),cidade:v('ccid'),regiao:v('creg'),canal:v('ccan'),status:v('cst'),contato:v('ccon'),tel:v('ctel'),email:v('ceml'),etapa:v('ceta'),dataAcao:v('cdat'),proxAcao:v('cpax'),valPot:+v('cvp')||0,prob:(+v('cprob')||25)/100,obs:v('cobs')};
  let clientes = getData('clientes');
  if(editClienteId){
    const idx = clientes.findIndex(c => c.id === editClienteId);
    if(idx >= 0) {
      clientes[idx] = { ...clientes[idx], ...data };
      setData('clientes', clientes);
    }
  } else {
    clientes.push({id:uid(), ...data});
    setData('clientes', clientes);
  }
  document.querySelector('.mbg')?.remove();
  _renderCRM();toast(editClienteId?'Atualizado ✓':'Cadastrado ✓','tok');
}

function delCliente(id){
  if(!confirm('Excluir este cliente?'))return;
  deleteData('clientes', id);
  _renderCRM();toast('Removido');
}

function orcSetProd(i,chave){
  ORC.items[i].prod=chave||null;
  const p=chave?PRODS.find(x=>x.chave===chave):null;
  const cli=getData('clientes').find(c=>c.id===ORC.cliId);
  const canal=cli?.canal||'Hospital';
  ORC.items[i].preco=p?(canal==='Distribuidor'?+p.dMin:+p.hMin):0;
  _renderOrc();
}
function orcSetCx(i,val){ORC.items[i].cx=Math.max(0,val||0);_renderOrc();}
function orcSetFrascos(i,val){
  const p=ORC.items[i].prod?PRODS.find(x=>x.chave===ORC.items[i].prod):null;
  if(p&&p.cx>0) ORC.items[i].cx=Math.round((val||0)/p.cx);
  _renderOrc();
}
function orcSetPreco(i,val){ORC.items[i].preco=val;_renderOrc();}

function genNum(){
  const peds = getData('pedidos');
  const max = peds.reduce((m,p)=>{const n=parseInt(p.num?.split('-').pop()||0);return n>m?n:m;},0);
  const d=new Date();
  return`PED-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(max+1).padStart(3,'0')}`;
}

function savePedido(){
  const cli=getData('clientes').find(c=>c.id===ORC.cliId);
  if(!cli){toast('Selecione um cliente','terr');return;}
  const val=ORC.items.filter(i=>i.prod&&i.cx>0);
  if(!val.length){toast('Adicione ao menos um produto','terr');return;}
  let tot=0,com=0;
  const itens=val.map((item,idx)=>{
    const p=PRODS.find(x=>x.chave===item.prod);
    const tUn=item.cx*p.cx;const tIt=tUn*item.preco;
    tot+=tIt;com+=tIt*COMISSAO_PCT;
    return{id:uid(), pedId:'', n:idx+1, chave:p.chave, nome:p.nome, ml:p.ml, cx:p.cx, qtdCx:item.cx, totUn:tUn, preco:item.preco, totIt:tIt, comIt:tIt*COMISSAO_PCT};
  });
  
  let peds = getData('pedidos');
  let ped;
  if(ORC_ID){
    const idx = peds.findIndex(p=>p.id===ORC_ID);
    if(idx>=0){
      ped=peds[idx];
      ped.clienteId=cli.id;
      ped.clienteNome=cli.nome;
      ped.clienteCNPJ=cli.cnpj;
      ped.clienteCidade=cli.cidade;
      ped.canal=cli.canal;
      ped.contato=cli.contato;
      ped.tel=cli.tel;
      ped.email=cli.email;
      ped.prazo=ORC.prazo;
      ped.obs=ORC.frete;
      ped.total=tot;
      ped.comissao=com;
      ped.status=ORC.status;
      ped.data=ped.data||today();
      peds[idx]=ped;
      setData('pedidos', peds);
      
      // Apaga itens e parcelas antigas deste pedido na nuvem antes de gravar os novos
      if(sb){
        sb.from('pedido_itens').delete().eq('pedid', ORC_ID).then(()=>{}).catch(e=>console.error(e));
        sb.from('comissao_parcelas').delete().eq('pedid', ORC_ID).then(()=>{}).catch(e=>console.error(e));
      }

      let allIt = getData('itens');
      allIt = allIt.filter(i=>i.pedId!==ORC_ID);
      itens.forEach(it=>{it.pedId=ORC_ID; allIt.push(it);});
      setData('itens', allIt);
      
      let allP = getData('parcelas');
      allP = allP.filter(p=>p.pedId!==ORC_ID);
      const partes=ORC.prazo.split('/').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x)&&x>0);
      if(partes.length>0){
        const cP=com/partes.length;
        const base=new Date();
        partes.forEach((d,i)=>{const vd=new Date(base);vd.setDate(vd.getDate()+d);allP.push({id:uid(),pedId:ORC_ID,pedNum:ped.num,clienteNome:cli.nome,n:i+1,venc:vd.toISOString().slice(0,10),valor:+cP.toFixed(2),status:'Pendente'});});
      }
      setData('parcelas', allP);
      toast(`Pedido ${ped.num} atualizado! ✓`,'tok');
    }else{ORC_ID=null;return savePedido();}
  }else{
    const num=genNum();
    ped={id:uid(), num, data:today(), clienteId:cli.id, clienteNome:cli.nome, clienteCNPJ:cli.cnpj, clienteCidade:cli.cidade, canal:cli.canal, contato:cli.contato, tel:cli.tel, email:cli.email, prazo:ORC.prazo, obs:ORC.frete, total:tot, comissao:com, status:ORC.status};
    peds.unshift(ped);
    setData('pedidos', peds);
    const allIt = getData('itens');
    itens.forEach(it=>{it.pedId=ped.id; allIt.push(it);});
    setData('itens', allIt);
    const partes=ORC.prazo.split('/').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x)&&x>0);
    if(partes.length>0){
      const cP=com/partes.length;
      const allP = getData('parcelas');
      const base=new Date();
      partes.forEach((d,i)=>{const vd=new Date(base);vd.setDate(vd.getDate()+d);allP.push({id:uid(),pedId:ped.id,pedNum:num,clienteNome:cli.nome,n:i+1,venc:vd.toISOString().slice(0,10),valor:+cP.toFixed(2),status:'Pendente'});});
      setData('parcelas', allP);
    }
    toast(`Pedido ${num} salvo! ✓`,'tok');
  }
  ORC={cliId:null, items:Array(10).fill(0).map((_,i)=>({n:i+1,prod:null,cx:0,preco:0})), status:'Rascunho', prazo:'42/56', frete:'Frete CIF'};
  ORC_ID=null;
  go('hist');
}

  const ped = getData('pedidos').find(p=>p.id===id);

  if(ped.status==='Faturado'||ped.status==='Cancelado'){toast('Pedido faturado/cancelado não pode ser editado','terr');return;}
  const its = getData('itens').filter(i=>i.pedId===id);
  ORC={cliId:ped.clienteId, items:Array(10).fill(0).map((_,i)=>{const item=its.find(ip=>ip.n===i+1);return item?{n:i+1,prod:item.chave,cx:item.qtdCx,preco:item.preco}:{n:i+1,prod:null,cx:0,preco:0};}), status:ped.status, prazo:ped.prazo||'42/56', frete:ped.obs||'Frete CIF'};

function editStatus(id,atual){
  const novo=prompt('Novo status:\n'+STATUSPED.join(' / '),atual);
  if(!novo||!STATUSPED.includes(novo))return;
  updateData('pedidos', id, {status:novo});
  _renderHist();toast('Status atualizado ✓','tok');
}

function delPedido(id){
  if(!confirm('Excluir este pedido?'))return;
  deleteData('pedidos', id);
  let itens = getData('itens').filter(i=>i.pedId!==id);
  setData('itens', itens);
  let parcelas = getData('parcelas').filter(p=>p.pedId!==id);
  setData('parcelas', parcelas);
  if(sb){
    sb.from('pedido_itens').delete().eq('pedid', id).then(()=>{}).catch(e=>console.error(e));
    sb.from('comissao_parcelas').delete().eq('pedid', id).then(()=>{}).catch(e=>console.error(e));
  }
  _renderHist();toast('Removido');
}

      return`<tr><td>${r}</td><td>${cs.length}</td><td>R$${R(rv)}</td><td style="color:var(--gn);font-weight:600">R$${R(re)}</td></tr>`;}).join('')}</tbody></table></div>
    </div>
  </div>`;
}

// ================================================================
// LOGÍSTICA
// ================================================================
let logData=LOG_BASE.map(item=>({...item,qtdLotes:1,totalFrascos:item.frascosPorLote*1}));
function renderLog(){
  document.getElementById('actions').innerHTML=`
    <button class="btn bs bsm" onclick="resetLog()">🔄 Zerar</button>
    <button class="btn bs bsm" onclick="exemploLog()">📊 Exemplo</button>`;
  _renderLog();
}

function _renderLog(){
  let html=`<div class="card"><div class="ch"><span class="ct">📦 Planejamento Logístico - Basal Farma</span></div>
    <p style="font-size:10px;color:var(--t3);margin-bottom:8px">Preencha <strong style="color:var(--ac)">Qtd de Lotes</strong> ou <strong style="color:var(--ac)">Total Frascos</strong> (campos em azul).</p>
    <div class="tw"><table>
      <thead><tr><th>Volume (mL)</th><th>Frascos/Lote</th><th>Peso/Frasco (kg)</th><th style="background:#e8f0fe;color:#1a56db;">Lotes</th><th style="background:#e8f0fe;color:#1a56db;">Frascos</th><th>Peso/Lote (kg)</th><th>Peso Total (kg)</th><th>% Truck</th><th>% Carreta</th><th>Veículo</th></tr></thead>
      <tbody>`;
  let totalFrascos=0,pesoTotal=0;
  logData.forEach((item,idx)=>{
    const frascosLote=item.frascosPorLote,pesoFrasco=item.pesoFrasco;
    const qtdLotes=item.qtdLotes||0,totalFrascosLinha=item.totalFrascos||0;
    const pesoLote=frascosLote*pesoFrasco,pesoTotalLinha=pesoLote*qtdLotes;
    const pctTruck=CAP_TRUCK>0?(pesoTotalLinha/CAP_TRUCK)*100:0;
    const pctCarreta=CAP_CARRETA>0?(pesoTotalLinha/CAP_CARRETA)*100:0;
    let veiculo='—';if(pesoTotalLinha>0)veiculo=pesoTotalLinha<=CAP_TRUCK?'Truck':'Carreta';
    totalFrascos+=totalFrascosLinha;pesoTotal+=pesoTotalLinha;
    html+=`<tr><td class="log-td">${item.volume}</td><td class="log-td">${frascosLote.toLocaleString()}</td><td class="log-td">${pesoFrasco.toFixed(2)}</td>
      <td class="log-td"><input class="azul" type="number" min="0" step="0.5" value="${qtdLotes}" onchange="updateLogLotes(${idx},this.value)"></td>
      <td class="log-td"><input class="azul" type="number" min="0" step="1" value="${totalFrascosLinha}" onchange="updateLogFrascos(${idx},this.value)"></td>
      <td class="log-td">${pesoLote.toFixed(2)}</td><td class="log-td">${pesoTotalLinha.toFixed(2)}</td>
      <td class="log-td ${pctTruck>100?'carreta':'truck'}">${pctTruck.toFixed(1)}%</td>
      <td class="log-td ${pctCarreta>100?'carreta':'truck'}">${pctCarreta.toFixed(1)}%</td>
      <td class="log-td"><span class="badge ${veiculo==='Truck'?'bgn':veiculo==='Carreta'?'bpu':'bgr'}">${veiculo}</span></td></tr>`;
  });
  const pctTruckTotal=CAP_TRUCK>0?(pesoTotal/CAP_TRUCK)*100:0;
  const pctCarretaTotal=CAP_CARRETA>0?(pesoTotal/CAP_CARRETA)*100:0;
  const veiculoTotal=pesoTotal>0?(pesoTotal<=CAP_TRUCK?'Truck':'Carreta'):'—';
  html+=`</tbody>
      <tfoot style="font-weight:700;background:var(--acbg);">
        <tr><td class="log-td total" colspan="5">TOTAL</td><td class="log-td total">${logData.reduce((s,i)=>s+(i.frascosPorLote*i.pesoFrasco*(i.qtdLotes||0)),0).toFixed(2)}</td>
        <td class="log-td total">${pesoTotal.toFixed(2)}</td>
        <td class="log-td ${pctTruckTotal>100?'carreta':'truck'}">${pctTruckTotal.toFixed(1)}%</td>
        <td class="log-td ${pctCarretaTotal>100?'carreta':'truck'}">${pctCarretaTotal.toFixed(1)}%</td>
        <td class="log-td"><span class="badge ${veiculoTotal==='Truck'?'bgn':veiculoTotal==='Carreta'?'bpu':'bgr'}">${veiculoTotal}</span></td></tr>
      </tfoot>
    </table></div></div>
  <div class="card">
    <div class="ch"><span class="ct">📊 Resumo automático da carga</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;">
      <div class="stat sbl"><div class="sl">Total de frascos</div><div class="sv">${totalFrascos.toLocaleString()}</div></div>
      <div class="stat sgn"><div class="sl">Peso total da carga</div><div class="sv">${pesoTotal.toFixed(1)} kg</div></div>
      <div class="stat sam"><div class="sl">Capacidade Truck</div><div class="sv">${CAP_TRUCK.toLocaleString()} kg</div><div class="ss">${pctTruckTotal>100?'⚠️ Excede':'✅ Cabe'}</div></div>
      <div class="stat spu"><div class="sl">Capacidade Carreta</div><div class="sv">${CAP_CARRETA.toLocaleString()} kg</div><div class="ss">${pctCarretaTotal.toFixed(1)}% utilizada</div></div>
    </div>
    <div style="margin-top:10px;padding:10px;background:var(--acbg);border-radius:var(--rsm);text-align:center;font-size:15px;font-weight:700;color:var(--ac);">
      🚛 Veículo sugerido: <span style="color:${veiculoTotal==='Truck'?'var(--gn)':'var(--pu)'}">${veiculoTotal}</span>
      ${veiculoTotal==='Truck'?' (até 15 toneladas)':' (até 27 toneladas)'}
    </div>
  </div>`;
  document.getElementById('content').innerHTML=html;
}
function updateLogLotes(idx,val){const qtd=parseFloat(val)||0;logData[idx].qtdLotes=Math.max(0,qtd);logData[idx].totalFrascos=Math.round(logData[idx].frascosPorLote*qtd);_renderLog();}
function updateLogFrascos(idx,val){const total=parseInt(val)||0;logData[idx].totalFrascos=Math.max(0,total);logData[idx].qtdLotes=logData[idx].frascosPorLote>0?total/logData[idx].frascosPorLote:0;_renderLog();}
function resetLog(){if(!confirm('Zerar todas as quantidades?'))return;logData=logData.map(item=>({...item,qtdLotes:0,totalFrascos:0}));_renderLog();toast('Zerado ✓','tok');}
function exemploLog(){logData=[{volume:125,frascosPorLote:20000,pesoFrasco:0.15,qtdLotes:1,totalFrascos:20000},{volume:250,frascosPorLote:12000,pesoFrasco:0.28,qtdLotes:1,totalFrascos:12000},{volume:500,frascosPorLote:8000,pesoFrasco:0.55,qtdLotes:1,totalFrascos:8000},{volume:1000,frascosPorLote:4000,pesoFrasco:1.05,qtdLotes:1,totalFrascos:4000}];_renderLog();toast('Exemplo ✓','tok');}

function importarDados(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{try{
    const dados=JSON.parse(e.target.result);
    if(!dados.clientes)throw new Error('Inválido');
    if(!confirm('Substituir dados atuais?'))return;
    setData('clientes', dados.clientes||[]);
    setData('pedidos', dados.pedidos||[]);
    setData('itens', dados.itens||[]);
    setData('parcelas', dados.parcelas||[]);
    toast('Importado ✓','tok');
    go('painel');
  }catch(err){toast('Erro ao importar','terr');}};
  reader.readAsText(file);
  input.value='';
}

// ================================================================
// SERVICE WORKER
// ================================================================
if('serviceWorker' in navigator){
  const swCode = `
    self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
    self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch', e => e.respondWith(
      fetch(e.request).catch(() => caches.match(e.request))
    ));
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

async function initApp() {
  console.log('🚀 Iniciando aplicativo completo...');

  document.documentElement.style.setProperty('--safe-bottom',
    window.navigator.userAgent.includes('iPhone') ? '20px' : '0px'
  );

  // Mostrar tela de carregamento enquanto conecta na nuvem
  document.getElementById('content').innerHTML = `
    <div style="padding:60px 20px;text-align:center;color:var(--t3)">
      <div style="font-size:36px;margin-bottom:12px">☁️</div>
      <p>Conectando à nuvem...</p>
    </div>`;

  try {
    sb = supabase.createClient(SUPA_URL, SUPA_KEY);
    await initData();
  } catch(e) {
    console.error('Erro ao conectar Supabase:', e);
    document.getElementById('content').innerHTML = `
      <div style="padding:40px 20px;text-align:center;max-width:480px;margin:0 auto">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <h2 style="color:#991b1b;margin-bottom:12px">Erro de conexão</h2>
        <p style="color:#4a5568;line-height:1.7">Não foi possível conectar ao banco de dados. Verifique sua internet e recarregue a página.</p>
        <p style="font-size:11px;color:#7a8699;margin-top:12px">${e.message}</p>
      </div>`;
    return;
  }

  const clientes = getData('clientes');
  console.log('📊 Clientes carregados:', clientes.length);
  toast(clientes.length > 0 ? `✅ ${clientes.length} clientes carregados da nuvem!` : '⚠️ Nenhum cliente encontrado.', clientes.length>0?'tok':'terr');

  go('painel');
  setTimeout(() => showBackupIndicator(true), 1000);
}
