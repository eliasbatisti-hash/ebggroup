<style>
:root{
  --bg:#f4f6fa;--surface:#fff;--s2:#f0f2f7;--border:#e2e6ed;--bd2:#c5ccd8;
  --text:#1a1d24;--t2:#556070;--t3:#8a93a8;
  --ac:#1a56db;--acbg:#eff4ff;
  --gn:#0d7a4e;--gnbg:#e6f5ee;
  --am:#92400e;--ambg:#fef3c7;
  --rd:#991b1b;--rdbg:#fee2e2;
  --pu:#5b21b6;--pubg:#ede9fe;
  --r:10px;--rsm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
button{cursor:pointer;font-family:inherit;font-size:13px;border:none;transition:all .15s;}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--text);outline:none;}

.sidebar{width:208px;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;transition:transform .25s;}
.logo{padding:16px;border-bottom:1px solid var(--border);}
.logo .br{font-size:15px;font-weight:800;}.logo .sub{font-size:11px;color:var(--t3);margin-top:1px;}
nav{flex:1;padding:6px 0;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:8px;padding:9px 14px;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all .12s;}
.ni:hover{background:var(--bg);color:var(--text);}
.ni.active{background:var(--acbg);color:var(--ac);border-left-color:var(--ac);}
.ni svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;}
.sfooter{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--t3);}

.main{margin-left:208px;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar h1{font-size:15px;font-weight:700;}
.content{padding:20px;}
.hbg{display:none;background:none;border:none;font-size:21px;cursor:pointer;color:var(--text);margin-right:8px;}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;}

.btn{padding:7px 13px;border-radius:var(--rsm);font-weight:500;display:inline-flex;align-items:center;gap:5px;font-size:13px;}
.bp{background:var(--ac);color:#fff;}.bp:hover{background:#1648c0;}
.bs{background:var(--surface);border:1px solid var(--bd2);color:var(--text);}.bs:hover{background:var(--bg);}
.bd{background:var(--rdbg);color:var(--rd);border:1px solid #fca5a5;}
.bg_{background:var(--gnbg);color:var(--gn);border:1px solid #6ee7b7;}
.bsm{padding:4px 9px;font-size:12px;}.bxs{padding:3px 7px;font-size:11px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ct{font-size:14px;font-weight:700;}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;}
.sl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.sv{font-size:20px;font-weight:800;}.ss{font-size:11px;color:var(--t3);margin-top:1px;}
.sbl{border-left:3px solid var(--ac);}.sgn{border-left:3px solid var(--gn);}
.sam{border-left:3px solid #d97706;}.spu{border-left:3px solid var(--pu);}

.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--s2);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}

.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;white-space:nowrap;}
.bbl{background:var(--acbg);color:var(--ac);}
.bgn{background:var(--gnbg);color:var(--gn);}
.bam{background:var(--ambg);color:var(--am);}
.brd{background:var(--rdbg);color:var(--rd);}
.bgr{background:var(--s2);color:var(--t2);}
.bpu{background:var(--pubg);color:var(--pu);}
.btl{background:#e0f5f0;color:#0d6e56;}

.fg{margin-bottom:11px;}
.fl{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:3px;}
.fi{width:100%;border:1.5px solid var(--border);border-radius:var(--rsm);padding:7px 9px;background:var(--surface);transition:border .15s;}
.fi:focus{border-color:var(--ac);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

.mbg{position:fixed;inset:0;background:rgba(10,14,30,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:24px 12px;overflow-y:auto;}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:580px;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.mh{padding:16px 20px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mh h2{font-size:14px;font-weight:700;}
.mb_{padding:16px 20px;}
.mf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.mx{background:none;font-size:20px;color:var(--t3);padding:0 3px;line-height:1;}.mx:hover{color:var(--text);}

.sr{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.si{flex:1;min-width:160px;border:1.5px solid var(--border);border-radius:var(--rsm);padding:6px 10px;background:var(--surface);}
.si:focus{border-color:var(--ac);}

/* ORCAMENTO */
.og{display:grid;grid-template-columns:22px 1fr 65px 60px 78px 78px 24px;gap:5px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.og:last-child{border-bottom:none;}
.oh{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;}
.og input{padding:5px 6px;border:1.5px solid var(--border);border-radius:var(--rsm);width:100%;text-align:right;font-size:12px;}
.og input:focus{border-color:var(--ac);}
.og input[readonly]{background:var(--s2);color:var(--t2);}
.totbox{background:var(--acbg);border-radius:var(--rsm);padding:10px 13px;display:flex;justify-content:space-between;align-items:center;margin-top:10px;}

.barr{margin-bottom:8px;}
.brl{font-size:11px;color:var(--t2);display:flex;justify-content:space-between;margin-bottom:2px;}
.brbg{background:var(--s2);border-radius:20px;height:6px;overflow:hidden;}
.brfill{height:100%;border-radius:20px;background:var(--ac);transition:width .4s;}

.toast{position:fixed;bottom:18px;right:18px;padding:9px 14px;border-radius:var(--r);font-size:12px;font-weight:500;z-index:500;opacity:0;transform:translateY(5px);transition:all .22s;pointer-events:none;max-width:280px;}
.toast.show{opacity:1;transform:translateY(0);}
.tok{background:var(--gn);color:#fff;}.terr{background:var(--rd);color:#fff;}.tinfo{background:var(--text);color:#fff;}

.empty{text-align:center;padding:40px 20px;color:var(--t3);}
.empty p{font-size:13px;color:var(--t2);margin-bottom:3px;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .ovl.open{display:block;}
  .main{margin-left:0;}
  .hbg{display:block;}
  .content{padding:12px;}
  .stats{grid-template-columns:1fr 1fr;}
  .r2,.r3{grid-template-columns:1fr;}
  .og{grid-template-columns:18px 1fr 55px 50px 68px 68px 68px 20px;}
}

/* EBG Mobile Extra */
@media(max-width:480px){
  .sv{font-size:17px;}
  .stats{grid-template-columns:1fr 1fr;gap:8px;}
  .stat{padding:10px 11px;}
  .content{padding:10px;}
  td,th{padding:6px 8px;font-size:11px;}
  .btn{font-size:12px;padding:6px 10px;}
  .bsm{padding:4px 8px;font-size:11px;}
  .bxs{padding:2px 6px;font-size:10px;}
  .og{grid-template-columns:18px 1fr 52px 52px 68px 68px 18px;gap:4px;}
  .og input{padding:4px 5px;font-size:11px;}
  .modal{max-width:100%;border-radius:10px;}
  .topbar h1{font-size:14px;}
  .topbar{padding:10px 12px;}
  .ni{padding:8px 12px;font-size:12px;}
}
/* Touch targets maiores */
@media(hover:none){
  .ni{padding:11px 14px;}
  .btn{min-height:36px;}
  select.fi,input.fi{min-height:36px;}
  .bxs{padding:5px 9px;font-size:11px;}
}
</style>
</head>

const DB = {
  get(k){ try{return JSON.parse(localStorage.getItem('ebg1_'+k)||'null');}catch{return null;} },
  set(k,v){ localStorage.setItem('ebg1_'+k,JSON.stringify(v)); },
  init(){
    // Migrar dados de versões anteriores (bsc_ → bsc4_)
    if(!DB.get('ebginit1')){
      const oldCli = (() => { try{return JSON.parse(localStorage.getItem('bsc5_clientes')||'null');}catch{return null;} })();
      const oldPed = (() => { try{return JSON.parse(localStorage.getItem('bsc5_pedidos')||'null');}catch{return null;} })();
      const oldIt  = (() => { try{return JSON.parse(localStorage.getItem('bsc5_itens')||'null');}catch{return null;} })();
      const oldPar = (() => { try{return JSON.parse(localStorage.getItem('bsc5_parcelas')||'null');}catch{return null;} })();
      // Se tinha dados salvos na versão antiga, migra. Senão, usa os dados iniciais.
      DB.set('clientes', oldCli && oldCli.length > 0 ? oldCli : CLIENTES_INICIAIS);
      DB.set('pedidos',  oldPed && oldPed.length > 0 ? oldPed : PEDIDOS_INICIAIS);
      DB.set('itens',    oldIt  && oldIt.length  > 0 ? oldIt  : ITENS_INICIAIS);
      DB.set('parcelas', oldPar && oldPar.length > 0 ? oldPar : PARCELAS_INICIAIS);
      DB.set('ebginit1', true);
    }
  }
};

let _tt;
function toast(msg,tp='tinfo'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+tp+' show';
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);
}

function sProd(i,chave){
  ORC.items[i].prod=chave||null;
  const p=chave?PRODS.find(x=>x.chave===chave):null;

  const canal=cli?.canal||'Hospital';
  ORC.items[i].preco=p?(canal==='Distribuidor'?+p.dMin:+p.hMin):0;
  _rOrc();
}
function sCx(i,val,tipo){
  const p=ORC.items[i].prod?PRODS.find(x=>x.chave===ORC.items[i].prod):null;
  if(tipo==='un'&&p&&p.cx>0){ORC.items[i].cx=Math.round(val/p.cx);}
  else{ORC.items[i].cx=val;}
  _rOrc();
}
function sPreco(i,val){ORC.items[i].preco=val;_rOrc();}

function lOrc(){
  if(!confirm('Limpar orçamento atual?'))return;
  ORC={cliId:null,items:Array(10).fill(0).map((_,i)=>({n:i+1,prod:null,cx:0,preco:0})),status:'Rascunho',prazo:'42/56',frete:'Frete CIF'};
  _rOrc();
}

function gNum(){
  const peds=DB.get('pedidos')||[];
  const max=peds.reduce((m,p)=>{const n=parseInt(p.num?.split('-').pop()||0);return n>m?n:m;},0);
  const d=new Date();
  return`PED-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(max+1).padStart(3,'0')}`;
}

function sPed(){
  const cli=(DB.get('clientes')||[]).find(c=>c.id===ORC.cliId);
  if(!cli){toast('Selecione um cliente','terr');return;}
  const val=ORC.items.filter(i=>i.prod&&i.cx>0);
  if(!val.length){toast('Adicione ao menos um produto','terr');return;}
  let tot=0,com=0;
  const itens=val.map((item,idx)=>{
    const p=PRODS.find(x=>x.chave===item.prod);
    const tUn=item.cx*p.cx;const tIt=tUn*item.preco;
    tot+=tIt;com+=tIt*COMISSAO_PCT;
    return{pedId:'',n:idx+1,chave:p.chave,nome:p.nome,ml:p.ml,cx:p.cx,qtdCx:item.cx,totUn:tUn,preco:item.preco,totIt:tIt,comIt:tIt*0.02};
  });
  const num=gNum();
  const ped={id:uid(),num,data:today(),clienteId:cli.id,clienteNome:cli.nome,clienteCNPJ:cli.cnpj,clienteCidade:cli.cidade,canal:cli.canal,contato:cli.contato,tel:cli.tel,email:cli.email,prazo:ORC.prazo,obs:ORC.frete,total:tot,comissao:com,status:ORC.status};
  const peds=DB.get('pedidos')||[];peds.unshift(ped);DB.set('pedidos',peds);
  const allIt=DB.get('itens')||[];itens.forEach(it=>allIt.push({...it,pedId:ped.id}));DB.set('itens',allIt);
  const partes=ORC.prazo.split('/').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x));
  const cP=com/partes.length;const allP=DB.get('parcelas')||[];const base=new Date();
  partes.forEach((d,i)=>{const vd=new Date(base);vd.setDate(vd.getDate()+d);allP.push({id:uid(),pedId:ped.id,pedNum:num,clienteNome:cli.nome,n:i+1,venc:vd.toISOString().slice(0,10),valor:+cP.toFixed(2),status:'Pendente'});});
  DB.set('parcelas',allP);
  toast(`Pedido ${num} salvo! ✓`,'tok');
  lOrc();go('hist');
}

  doc.text(`Cliente: ${cli.nome}`,mg+3,y+12);
  doc.text(`CNPJ: ${cli.cnpj||'—'}   Cidade: ${cli.cidade||'—'}   Canal: ${cli.canal||'—'}`,mg+3,y+17);
  doc.text(`Contato: ${cli.contato||'—'}   Tel: ${cli.tel||'—'}   E-mail: ${cli.email||'—'}`,mg+3,y+22);
  y+=28;

  // Condições
  doc.setFillColor(26,86,219);doc.rect(mg,y,W-mg*2,7,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
  doc.text('CONDIÇÕES COMERCIAIS',mg+3,y+5);
  y+=10;
  doc.setTextColor(30,30,30);doc.setFont('helvetica','normal');doc.setFontSize(8.5);

  y+=8;

  // Tabela produtos

  doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
  doc.text('PRODUTOS',mg+3,y+5);
  y+=9;

  // Header tabela
  const cols=[8,72,18,20,24,24];
  const hdrs=['#','Produto','Cx','Tot Un','Preço R$','Total R$'];
  let x=mg;
  doc.setFillColor(220,228,245);doc.rect(mg,y,W-mg*2,7,'F');
  doc.setTextColor(26,86,219);doc.setFontSize(8);doc.setFont('helvetica','bold');
  cols.forEach((w,ci)=>{doc.text(hdrs[ci],x+2,y+5,{maxWidth:w-2});x+=w;});

  let tot=0,com=0;

    const p=PRODS.find(x=>x.chave===item.prod);

    if(idx%2===0){doc.setFillColor(248,250,255);doc.rect(mg,y,W-mg*2,7,'F');}
    doc.setTextColor(30,30,30);doc.setFont('helvetica','normal');doc.setFontSize(8);
    x=mg;
    const vals=[String(idx+1),p.chave,String(item.cx),String(tUn),item.preco.toFixed(4),tIt.toFixed(2)];
    cols.forEach((w,ci)=>{
      const align=ci>=2?'right':'left';
      const tx=align==='right'?x+w-2:x+2;
      doc.text(vals[ci],tx,y+5,{align,maxWidth:w-3});

  // Total
  y+=3;
  doc.setFillColor(26,86,219);doc.rect(mg,y,W-mg*2,10,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');

  doc.text(`R$ ${R(tot)}`,W-mg-2,y+7,{align:'right'});
  y+=14;
  doc.setTextColor(30,30,30);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
  y+=4;

  // Rodapé
  doc.setFillColor(240,242,247);doc.rect(mg,y,W-mg*2,14,'F');
  doc.setFontSize(8);doc.setTextColor(80,90,110);
  doc.text('⚠ Este orçamento tem validade de 15 dias a partir da data de emissão.',mg+3,y+5);
  doc.text('Para aprovação, responda este e-mail ou entre em contato com o representante.',mg+3,y+10);
  y+=18;
  doc.setFontSize(8);doc.setTextColor(150,160,175);
  doc.text('rbmedmat@gmail.com  |  (48) 99610-0303  |  EBG Group',W/2,y,{align:'center'});

  const fname=`EBG_Orcamento_${cli.nome.replace(/\s+/g,'_')}_${today()}.pdf`;

// ── HISTÓRICO ──────────────────────────────────────────────────
let hF={q:'',status:''};
function rHist(){_rHist();}
function _rHist(){
  let peds=DB.get('pedidos')||[];
  if(hF.q)peds=peds.filter(p=>(p.clienteNome+p.num).toLowerCase().includes(hF.q.toLowerCase()));
  if(hF.status)peds=peds.filter(p=>p.status===hF.status);
  document.getElementById('content').innerHTML=`
  <div class="sr">
    <input class="si" placeholder="Buscar cliente ou nº pedido..." value="${hF.q}" oninput="hF.q=this.value;_rHist()">
    <select class="fi" style="width:auto" onchange="hF.status=this.value;_rHist()"><option value="">Todos status</option>${STATUSPED.map(s=>`<option ${hF.status===s?'selected':''}>${s}</option>`).join('')}</select>
  </div>
  <div class="tw"><table>
    <thead><tr><th>Nº Pedido</th><th>Data</th><th>Cliente</th><th>Canal</th><th>Total</th><th>Comissão</th><th>Prazo</th><th>Frete</th><th>Status</th><th></th></tr></thead>
    <tbody>${peds.length===0?`<tr><td colspan="10"><div class="empty"><p>Nenhum pedido</p></div></td></tr>`:
    peds.map(p=>`<tr>
      <td style="font-family:monospace;font-size:10px">${p.num}</td>
      <td style="font-size:11px">${fD(p.data)}</td>
      <td><strong style="font-size:12px">${p.clienteNome}</strong><br><span style="font-size:10px;color:var(--t3)">${p.clienteCidade||''}</span></td>
      <td>${bCanal(p.canal)}</td>
      <td><strong>R$${R(p.total)}</strong></td>
      <td style="color:var(--gn);font-weight:600">R$${R(p.comissao)}</td>
      <td style="font-size:11px">${p.prazo||'—'}</td>
      <td style="font-size:11px">${p.obs||'—'}</td>
      <td>${bStatus(p.status)}</td>
      <td style="white-space:nowrap">
        <button class="btn bs bxs" onclick="vPed('${p.id}')">👁</button>
        <button class="btn bs bxs" onclick="mStatus('${p.id}','${p.status}')">✏️</button>
        <button class="btn bd bxs" onclick="dPed('${p.id}')">🗑</button>
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}
function vPed(id){
  const ped=(DB.get('pedidos')||[]).find(p=>p.id===id);
  const its=(DB.get('itens')||[]).filter(i=>i.pedId===id);
  const m=document.createElement('div');m.className='mbg';
  m.innerHTML=`<div class="modal">
    <div class="mh"><h2>${ped.num}</h2><button class="mx" onclick="this.closest('.mbg').remove()">×</button></div>
    <div class="mb_">
      <div class="r2" style="margin-bottom:12px;font-size:12px">
        <div><strong>Cliente</strong><br>${ped.clienteNome}<br><span style="color:var(--t3)">${ped.clienteCNPJ||''}</span></div>
        <div><strong>Condições</strong><br>Prazo: ${ped.prazo||'—'}<br>Frete: ${ped.obs||'—'}</div>
      </div>
      <div class="tw"><table>
        <thead><tr><th>#</th><th>Produto</th><th>Qtd CX</th><th>Tot Un</th><th>Preço</th><th>Total</th><th>Comissão</th></tr></thead>
        <tbody>${its.map(i=>`<tr><td>${i.n}</td><td>${i.chave}</td><td>${i.qtdCx}</td><td>${i.totUn}</td><td>R$${(+i.preco).toFixed(4)}</td><td>R$${R(i.totIt)}</td><td>R$${R(i.comIt)}</td></tr>`).join('')}</tbody>
      </table></div>
      <div class="totbox" style="margin-top:10px">
        <div><div style="font-size:12px;font-weight:600;color:var(--ac)">Total</div><div style="font-size:10px;color:var(--ac)">Comissão: R$${R(ped.comissao)}</div></div>
        <div style="font-size:18px;font-weight:800;color:var(--ac)">R$${R(ped.total)}</div>
      </div>
    </div>
    <div class="mf"><button class="btn bs" onclick="this.closest('.mbg').remove()">Fechar</button></div>
  </div>`;
  document.body.appendChild(m);
}
function mStatus(id,atual){
  const novo=prompt('Novo status:\n'+STATUSPED.join(' / '),atual);
  if(!novo||!STATUSPED.includes(novo))return;
  const peds=DB.get('pedidos')||[];const i=peds.findIndex(p=>p.id===id);
  if(i>=0)peds[i].status=novo;DB.set('pedidos',peds);
  _rHist();toast('Status atualizado ✓','tok');
}
function dPed(id){
  if(!confirm('Excluir este pedido?'))return;
  DB.set('pedidos',(DB.get('pedidos')||[]).filter(p=>p.id!==id));
  DB.set('itens',(DB.get('itens')||[]).filter(i=>i.pedId!==id));
  DB.set('parcelas',(DB.get('parcelas')||[]).filter(p=>p.pedId!==id));
  _rHist();toast('Pedido removido');
}

// ── RELATÓRIOS ─────────────────────────────────────────────────
function rRel(){
  const cls=DB.get('clientes')||[];
  const peds=DB.get('pedidos')||[];
  const vp=cls.reduce((s,c)=>s+(+c.valPot||0),0);
  const ve=cls.reduce((s,c)=>s+(+c.valPot||0)*(+c.prob||0),0);
  const fat=peds.filter(p=>p.status==='Faturado').reduce((s,p)=>s+(+p.total||0),0);
  const com=peds.filter(p=>p.status==='Faturado').reduce((s,p)=>s+(+p.comissao||0),0);
  const pF=peds.filter(p=>p.status==='Faturado');
  const tk=pF.length>0?fat/pF.length:0;
  const eC=ETAPAS.map(e=>({e,n:cls.filter(c=>c.etapa===e).length}));
  document.getElementById('content').innerHTML=`
  <div class="stats">
    <div class="stat sbl"><div class="sl">Total Clientes</div><div class="sv">${cls.length}</div><div class="ss">Distrib ${cls.filter(c=>c.canal==='Distribuidor').length} · Hosp ${cls.filter(c=>c.canal==='Hospital').length}</div></div>
    <div class="stat sgn"><div class="sl">Pipeline Potencial</div><div class="sv">R$${R(vp)}</div><div class="ss">Esperado: R$${R(ve)}</div></div>
    <div class="stat sam"><div class="sl">Total Faturado</div><div class="sv">R$${R(fat)}</div><div class="ss">Ticket médio: R$${R(tk)}</div></div>
    <div class="stat spu"><div class="sl">Comissões Geradas</div><div class="sv">R$${R(com)}</div><div class="ss">${pF.length} pedidos faturados</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" id="rgrid">
    <div class="card">
      <div class="ch"><span class="ct">Funil de Vendas</span></div>
      ${eC.filter(x=>x.n>0).map(x=>{const pct=cls.length>0?Math.round(x.n/cls.length*100):0;
      return`<div class="barr"><div class="brl"><span>${x.e}</span><span>${x.n} (${pct}%)</span></div><div class="brbg"><div class="brfill" style="width:${pct}%;background:${eColor(x.e)}"></div></div></div>`;}).join('')}
    </div>
    <div class="card">
      <div class="ch"><span class="ct">Pipeline por Região</span></div>
      <div class="tw"><table>
        <thead><tr><th>Região</th><th>Cli</th><th>Potencial</th><th>Esperado</th></tr></thead>
        <tbody>${REGIOES.map(r=>{const cs=cls.filter(c=>c.regiao===r);const rv=cs.reduce((s,c)=>s+(+c.valPot||0),0);const re=cs.reduce((s,c)=>s+(+c.valPot||0)*(+c.prob||0),0);
        return`<tr><td>${r}</td><td>${cs.length}</td><td>R$${R(rv)}</td><td style="color:var(--gn);font-weight:600">R$${R(re)}</td></tr>`;}).join('')}</tbody>
      </table></div>
    </div>
  </div>`;
  const s=document.createElement('style');s.textContent='@media(max-width:640px){#rgrid{grid-template-columns:1fr!important}}';document.head.appendChild(s);
}

// ── COMISSÕES ──────────────────────────────────────────────────
function rCom(){
  const pars=DB.get('parcelas')||[];
  const tdh=today();
  const venc=pars.filter(p=>p.status==='Pendente'&&p.venc&&p.venc<tdh);
  const aV=pars.filter(p=>p.status==='Pendente'&&p.venc&&p.venc>=tdh).sort((a,b)=>a.venc.localeCompare(b.venc));
  const rec=pars.filter(p=>p.status==='Recebida');
  const tP=pars.filter(p=>p.status==='Pendente').reduce((s,p)=>s+(+p.valor||0),0);
  const tR=rec.reduce((s,p)=>s+(+p.valor||0),0);
  document.getElementById('content').innerHTML=`
  <div class="stats">
    <div class="stat sam"><div class="sl">A Receber</div><div class="sv">R$${R(tP)}</div><div class="ss">${pars.filter(p=>p.status==='Pendente').length} parcelas</div></div>
    <div class="stat sgn"><div class="sl">Já Recebido</div><div class="sv">R$${R(tR)}</div><div class="ss">${rec.length} parcelas</div></div>
    <div class="stat sbl"><div class="sl">Vencidas</div><div class="sv">${venc.length}</div><div class="ss">R$${R(venc.reduce((s,p)=>s+(+p.valor||0),0))}</div></div>
  </div>
  ${venc.length?`<div class="card" style="border-left:3px solid var(--rd);margin-bottom:14px">
    <div class="ch"><span class="ct" style="color:var(--rd)">⚠️ Vencidas não pagas</span></div>
    <div class="tw"><table><thead><tr><th>Pedido</th><th>Cliente</th><th>Vencimento</th><th>Valor</th><th></th></tr></thead>
    <tbody>${venc.map(p=>`<tr>
      <td style="font-family:monospace;font-size:10px">${p.pedNum}</td><td>${p.clienteNome}</td>
      <td style="color:var(--rd)">${fD(p.venc)}</td>
      <td style="font-weight:600">R$${R(p.valor)}</td>
      <td><button class="btn bg_ bxs" onclick="rcb('${p.id}')">Recebida ✓</button></td>
    </tr>`).join('')}</tbody></table></div>
  </div>`:''}
  <div class="card">
    <div class="ch"><span class="ct">Próximos Vencimentos</span></div>
    ${aV.length===0?'<div class="empty"><p>Nenhuma parcela a vencer</p></div>':
    `<div class="tw"><table><thead><tr><th>Pedido</th><th>Cliente</th><th>Parcela</th><th>Vencimento</th><th>Dias</th><th>Valor</th><th></th></tr></thead>
    <tbody>${aV.map(p=>{const dias=Math.ceil((new Date(p.venc)-new Date())/86400000);
    return`<tr>
      <td style="font-family:monospace;font-size:10px">${p.pedNum}</td><td>${p.clienteNome}</td>
      <td style="font-size:11px">Parc. ${p.n}</td><td>${fD(p.venc)}</td>
      <td><span class="badge ${dias<=7?'brd':dias<=15?'bam':'bgr'}">${dias}d</span></td>
      <td style="font-weight:600">R$${R(p.valor)}</td>
      <td><button class="btn bg_ bxs" onclick="rcb('${p.id}')">Recebida ✓</button></td>
    </tr>`;}).join('')}</tbody></table></div>`}
    ${rec.length?`<div style="margin-top:16px"><div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Já Recebidas</div>
    <div class="tw"><table><thead><tr><th>Pedido</th><th>Cliente</th><th>Parcela</th><th>Valor</th></tr></thead>
    <tbody>${rec.map(p=>`<tr style="opacity:.55"><td style="font-family:monospace;font-size:10px">${p.pedNum}</td><td>${p.clienteNome}</td><td>Parc. ${p.n}</td><td>R$${R(p.valor)}</td></tr>`).join('')}</tbody></table></div></div>`:''}
  </div>`;
}
function rcb(id){
  const pars=DB.get('parcelas')||[];const i=pars.findIndex(p=>p.id===id);
  if(i>=0){pars[i].status='Recebida';pars[i].dataRec=today();}
  DB.set('parcelas',pars);rCom();toast('Comissão recebida marcada ✓','tok');
}

// ── INIT ───────────────────────────────────────────────────────
function exportarDados(){
  const dados = {
    clientes: DB.get('clientes')||[],
    pedidos:  DB.get('pedidos')||[],
    itens:    DB.get('itens')||[],
    parcelas: DB.get('parcelas')||[],
    exportadoEm: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(dados,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'EBGGroup_backup_' + today() + '.json';
  a.click();
  toast('Dados exportados! ✓','tok');
}

function importarDados(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const dados = JSON.parse(e.target.result);
      if(!dados.clientes) throw new Error('Arquivo inválido');
      if(!confirm('Importar dados? Os dados atuais serão substituídos.')) return;
      DB.set('clientes', dados.clientes);
      DB.set('pedidos',  dados.pedidos||[]);
      DB.set('itens',    dados.itens||[]);
      DB.set('parcelas', dados.parcelas||[]);
      toast('Dados importados com sucesso! ✓','tok');
      go('painel');
    }catch(err){
      toast('Erro ao importar: arquivo inválido','terr');
    }
  };
  reader.readAsText(file);
  input.value='';
}

DB.init();
go('painel');
</script>
